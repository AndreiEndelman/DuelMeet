<ion-content class="auth-content">
  <div class="auth-glow"></div>

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <img src="assets/icon/logo-transparent.png" alt="DuelMeet" class="auth-logo-img" />
      <p class="auth-sub">We'll send you a reset link</p>
    </div>

    <!-- Success state -->
    <div class="success-banner" *ngIf="sent">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      If that email is registered, a reset link is on its way. Check your inbox (and spam folder).
    </div>

    <!-- Error -->
    <div class="error-banner" *ngIf="errorMsg">
      <ion-icon name="alert-circle-outline"></ion-icon>
      {{ errorMsg }}
    </div>

    <!-- Form (hidden after success) -->
    <ng-container *ngIf="!sent">
      <div class="form-group">
        <label class="form-label" for="fp-email">Email address</label>
        <ion-input
          id="fp-email"
          class="form-input"
          type="email"
          placeholder="you@example.com"
          [(ngModel)]="email"
          autocomplete="email"
          (keyup.enter)="submit()">
        </ion-input>
      </div>

      <button class="btn-primary" [disabled]="loading" (click)="submit()">
        <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
        <span *ngIf="!loading">Send Reset Link</span>
      </button>
    </ng-container>

    <p class="auth-footer">
      <a routerLink="/auth/login" class="auth-link">← Back to login</a>
    </p>
  </div>
</ion-content>
