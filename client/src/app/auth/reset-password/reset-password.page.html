<ion-content class="auth-content">
  <div class="auth-glow"></div>

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <span class="auth-logo-emoji">🔐</span>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-sub">Choose a new password</p>
    </div>

    <!-- Success state -->
    <div class="success-banner" *ngIf="success">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      Password reset! Redirecting you to login…
    </div>

    <!-- Error -->
    <div class="error-banner" *ngIf="errorMsg">
      <ion-icon name="alert-circle-outline"></ion-icon>
      {{ errorMsg }}
    </div>

    <!-- Form -->
    <ng-container *ngIf="!success && token">
      <div class="form-group">
        <label class="form-label" for="rp-password">New password</label>
        <ion-input
          id="rp-password"
          class="form-input"
          type="password"
          placeholder="At least 6 characters"
          [(ngModel)]="password"
          autocomplete="new-password">
        </ion-input>
      </div>

      <div class="form-group">
        <label class="form-label" for="rp-confirm">Confirm password</label>
        <ion-input
          id="rp-confirm"
          class="form-input"
          type="password"
          placeholder="Repeat your password"
          [(ngModel)]="confirm"
          autocomplete="new-password"
          (keyup.enter)="submit()">
        </ion-input>
      </div>

      <button class="btn-primary" [disabled]="loading" (click)="submit()">
        <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
        <span *ngIf="!loading">Set New Password</span>
      </button>
    </ng-container>

    <p class="auth-footer">
      <a routerLink="/auth/login" class="auth-link">← Back to login</a>
    </p>
  </div>
</ion-content>
