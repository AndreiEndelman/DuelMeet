<ion-tabs>

  <ion-tab-bar slot="bottom" class="main-tab-bar">
    <ion-tab-button tab="home" class="tab-btn">
      <ion-icon name="home"></ion-icon>
      <ion-label>Home</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="find-game" class="tab-btn tab-btn--create">
      <div class="create-tab-icon">
        <ion-icon name="play-circle"></ion-icon>
      </div>
      <ion-label>Create</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="profile" class="tab-btn">
      <ion-icon name="person-circle"></ion-icon>
      <ion-label>Profile</ion-label>
    </ion-tab-button>
  </ion-tab-bar>

</ion-tabs>
